services:
  postgres:
    image: postgres:16

    container_name: vai-postgres

    environment:
      POSTGRES_DB: vai_db
      POSTGRES_USER: vai_user
      POSTGRES_PASSWORD: vai_password

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    restart: unless-stopped

  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile

    container_name: vai-backend

    ports:
      - "8000:8000"

    volumes:
      - ./apps/backend:/app

    depends_on:
      - postgres

    restart: unless-stopped

volumes:
  postgres_data: